<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Login | La Magia de Aya</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Stars -->

  <div class="stars"></div>

  <!-- Navbar -->

  <header class="navbar">

    <div class="logo-container">

      <img src="logo.png" class="logo">

      <h2 class="logo-text">
        La Magia de Aya
      </h2>

    </div>

  </header>

  <!-- Admin Login -->

  <section class="hero">

    <div class="product-card" style="max-width:400px; width:100%;">

      <h1 style="margin-bottom:25px; color:#7d5fb2;">
        Admin Login
      </h1>

      <input
        type="text"
        id="username"
        placeholder="Username"
        style="
          width:100%;
          padding:15px;
          margin-bottom:15px;
          border:none;
          border-radius:15px;
          background:#f3ecff;
          font-family:Poppins;
        "
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        style="
          width:100%;
          padding:15px;
          margin-bottom:20px;
          border:none;
          border-radius:15px;
          background:#f3ecff;
          font-family:Poppins;
        "
      >

      <button
        onclick="loginAdmin()"
        class="hero-btn"
        style="border:none; cursor:pointer;"
      >
        Login
      </button>

      <p
        id="loginMessage"
        style="margin-top:20px; color:red;"
      ></p>

    </div>

  </section>

  <script>

    function loginAdmin(){

      const username =
      document.getElementById("username").value;

      const password =
      document.getElementById("password").value;

      const message =
      document.getElementById("loginMessage");

      if(
        username === "aya" &&
        password === "aya_aya_000"
      ){

        window.location.href = "settings.html";

      }else{

        message.innerHTML =
        "Wrong username or password.";

      }

    }

  </script>

</body>
</html>
