<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Settings | La Magia de Aya</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Stars -->

  <div class="stars"></div>

  <!-- Navbar -->

  <header class="navbar">

    <div class="logo-container">

      <img src="logo.png" class="logo">

      <h2 class="logo-text">
        La Magia de Aya
      </h2>

    </div>

  </header>

  <!-- Settings -->

  <section class="products-preview">

    <h1 class="section-title">
      Admin Settings ⚙️
    </h1>

    <div class="products-grid">

      <!-- Add Product -->

      <div class="product-card">

        <h2 style="margin-bottom:20px;">
          Add Product
        </h2>

        <input
          type="text"
          placeholder="Product Name"
          style="
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:15px;
            background:#f3ecff;
          "
        >

        <input
          type="text"
          placeholder="Price"
          style="
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:15px;
            background:#f3ecff;
          "
        >

        <button
          class="hero-btn"
          style="border:none; cursor:pointer;"
        >
          Add
        </button>

      </div>

      <!-- Delete Product -->

      <div class="product-card">

        <h2 style="margin-bottom:20px;">
          Delete Product
        </h2>

        <input
          type="text"
          placeholder="Product Name"
          style="
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:15px;
            background:#f3ecff;
          "
        >

        <button
          class="hero-btn"
          style="
            border:none;
            cursor:pointer;
            background:#ff6b81;
          "
        >
          Delete
        </button>

      </div>

      <!-- Change Links -->

      <div class="product-card">

        <h2 style="margin-bottom:20px;">
          Change Links
        </h2>

        <input
          type="text"
          placeholder="Google Form Link"
          style="
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:15px;
            background:#f3ecff;
          "
        >

        <input
          type="text"
          placeholder="Instagram Link"
          style="
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:15px;
            background:#f3ecff;
          "
        >

        <button
          class="hero-btn"
          style="border:none; cursor:pointer;"
        >
          Save
        </button>

      </div>

    </div>

  </section>

  <!-- Footer -->

  <footer class="footer">

    <p>
      © 2026 La Magia de Aya — All Rights Reserved
    </p>

  </footer>

</body>
</html>
